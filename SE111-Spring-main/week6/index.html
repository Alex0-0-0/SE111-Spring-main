        //if statements
        //conditional operators 
        // >= Greater than/equal to
        // <= Less than/equal to
        // > Greater than
        // < less than
        // != not equal ( Only cares about the values)
        // == equal to (Only care about values)
        // !== not equal to value and type

        var numOne = 2 
        var numTwo = 49 
        var numThree = 1 
        var numFour = 4063

        if (numThree !== numFour){
            console.log(numOne + numTwo + numThree + numFour)
        }

        if(numOne >= 0 && numTwo > 0){
            console.log(numThree - numFour)
        }

        if(numOne >=2 || numTwo > 0){

        }

        //arithmatic
        var x = 75
        // adds one
        x++ 

        console.log(x)

        //adding five
        x = x + 5
        console.log(x)

        //adds five to x, same as above js short
        x += 5
        console.log(x)

        var y = 1000

        x += y

        }

        //calling the add function

        var name = add(fName, lName)
        console.log(name)

        function subtract(x,y,z,a){
            return x-y-z-a
        }
            
        var subX = 100

        var subZ = 50
        var subA = 25

        var sub = subtract(subX, subY, subZ, subA)
        console.log(sub)
