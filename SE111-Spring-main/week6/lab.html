<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab</title>
</head>
<body>

    <script>

        alert("Hello, This is the calculator machine")

        var math = prompt("Do you want to add, Subtract, multiply, or divide?")

        var num1 = Number(prompt("What is the first number"))
        var num2 = Number(prompt("What is the second number"))

         function calc(num1,num2){
         if(math == "add"){
             return num1+num2
         }

            if(math == "subtract"){
            return num1-num2
          }

         if(math == "multiply"){
            return num1*num2
         }

         if(math == "divide"){
             return num1/num2
          }
      }

        var result = calc(num1,num2)
        alert(result)
       

      







    </script>
    
</body>
</html>
