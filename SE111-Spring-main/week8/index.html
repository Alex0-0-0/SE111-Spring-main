    <script> 
        var numberForLoop = 0 


        //using Let instead of var
        // Let makes it a local variable
        // the condition needs to be true to start
        // it stops when the condition is false
        for(let i=0; i >= 54; i += 2){
            numberForLoop += 6
            console.log(numberForLoop)
        }

        function pizzaSquares(){
            console.log("pizza")
        }

        for (let i = 0; i <= 72; i++)
        {
            pizzaSquares()
        }

        var movies = [
            "spider-man",

        ]

        console.log(movies[4])
        console.log(movies[2])
        console.log(movies)

        for(let i=0; i < 7; i++)
        {

        }

        // an array can hold several things

        var uniqueArray = [

    ]
        // two D array
    var twoDArray = [
        [0,0,0,0,0,0],
        [1,23,4,5,6,3],
        [2,33,32,3,3,4],
        [12,2,4,2,3,4]
    ]

    //looping
    //loops through each array
    for(let x = 0; x< twoDArray.length ; x++)
    {
        // loops inside each array to get values
        //Making sure that we only loop through the size of the array
        for(let y = 0; y < twoDArray[x].length; y++)
         {
              console.log(twoDArray[x][y])
         }
    }


    // Objects

    var person = {
        first: "joel",
        last:"Hanson"
    }

    console.log(person.first)
    console.log(person.last)

    //changing

    person.first = " gage"

    console.log(person.first)

    var person = {

    }

    console.log("This car has" + car.wheels + " wheels")
    // call the function
    car.drive()

        // fun examples with for loops,objects and arrays

        // looping through the movies array
        for(let i = 0; i < movies.length; i++ )
    {

    }
